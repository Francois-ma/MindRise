[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]

[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "DJ", "UP", "S"]
ignore = [
  "S105",
  "S106",
  "S107",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]
