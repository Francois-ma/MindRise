services:
  postgres:
    image: postgres:17-alpine
    container_name: mindrise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindrise}
      POSTGRES_USER: ${POSTGRES_USER:-mindrise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-local-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mindrise_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mindrise_postgres_data:
