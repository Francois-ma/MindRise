services:
  - type: web
    name: mindrise-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: bash scripts/render_start.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mindrise-postgres
          property: connectionString
      - key: DATABASE_CONN_MAX_AGE
        value: 600
      - key: DATABASE_CONN_HEALTH_CHECKS
        value: true
      - key: DATABASE_DISABLE_SERVER_SIDE_CURSORS
        value: false
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: DJANGO_MEDIA_URL
        value: /media/
      - key: DJANGO_MEDIA_ROOT
        value: /opt/render/project/src/backend/media
      - key: SERVE_MEDIA_FILES
        value: true
      - key: PUBLIC_MEDIA_PREFIXES
        value: learning/materials
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: TRUST_PROXY_SSL_HEADER
        value: true
      - key: USE_X_FORWARDED_HOST
        value: true
      - key: DRF_NUM_PROXIES
        value: 1
      - key: ACCESS_TOKEN_LIFETIME_MINUTES
        value: 15
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: 7
      - key: WEB_CONCURRENCY
        value: 1
      - key: GUNICORN_TIMEOUT
        value: 120
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mind-rise-coral.vercel.app,https://mindrisewellness.org,https://www.mindrisewellness.org"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://mindrise-api.onrender.com,https://mind-rise-coral.vercel.app,https://mindrisewellness.org,https://www.mindrisewellness.org"
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_FIRST_NAME
        value: MindRise
      - key: DJANGO_SUPERUSER_LAST_NAME
        value: Admin
      - key: RESEND_API_URL
        value: https://api.resend.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "MindRise <no-reply@mindrisewellness.org>"
      - key: RESEND_TIMEOUT_SECONDS
        value: 8
      - key: CONTACT_RECIPIENT_EMAIL
        value: mindriserwanda@gmail.com
      - key: CONTACT_EMAIL_SUBJECT_PREFIX
        value: "[MindRise Contact]"
      - key: EMAIL_VERIFICATION_CODE_TTL_MINUTES
        value: 15
      - key: EMAIL_VERIFICATION_MAX_ATTEMPTS
        value: 5
      - key: EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS
        value: 60
      - key: AI_INSIGHTS_PROVIDER
        value: local
      - key: AI_INSIGHTS_INCLUDE_NOTES
        value: false
      - key: OPENAI_API_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHATBOT_MODEL
        value: gpt-5.5
      - key: OPENAI_CHATBOT_TIMEOUT_SECONDS
        value: 20
      - key: OPENAI_CHATBOT_MAX_OUTPUT_TOKENS
        value: 500
      - key: OPENAI_CHATBOT_REASONING_EFFORT
        value: low
      - key: OPENAI_CHATBOT_VERBOSITY
        value: low

databases:
  - name: mindrise-postgres
    plan: free
    databaseName: mindrise
    user: mindrise
    postgresMajorVersion: "17"
    ipAllowList: []
